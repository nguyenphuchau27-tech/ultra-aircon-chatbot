version: '3'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-aircon_startup}
    ports:
      - '5432:5432'

  redis:
    image: redis
    restart: always
    ports:
      - '6379:6379'

  backend:
    build: ../backend
    restart: always
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-change_me}
      DB_NAME: ${DB_NAME:-aircon_startup}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000}
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  admin:
    build: ../admin_dashboard/nextjs
    restart: always
    ports:
      - '4000:3000'

  nginx:
    image: nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - '80:80'
    depends_on:
      - backend
      - admin
