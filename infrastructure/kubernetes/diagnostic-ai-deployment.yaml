# infrastructure/kubernetes/diagnostic-ai-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostic-ai
  namespace: ultra-aircon
spec:
  replicas: 5
  selector:
    matchLabels:
      app: diagnostic-ai
  template:
    metadata:
      labels:
        app: diagnostic-ai
    spec:
      containers:
        - name: diagnostic-ai
          image: ${REGISTRY_URL}/diagnostic-ai:latest
          ports:
            - containerPort: 8001
