apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: ultra-aircon
  labels:
    app: admin-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      containers:
        - name: admin-dashboard
          image: ${REGISTRY_URL}/admin-dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://api.ultra-aircon.com/api
          readinessProbe:
            httpGet:
              path: /_next/static/
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /_next/static/
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: ultra-aircon
spec:
  selector:
    app: admin-dashboard
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
