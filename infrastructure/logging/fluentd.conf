# Fluentd configuration for Ultra Aircon Startup

# Source: Receive logs from applications
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Source: Read Docker container logs
<source>
  @type tail
  path /var/lib/docker/containers/*/*-json.log
  pos_file /var/log/fluentd/docker.pos
  tag docker.*
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

# Source: System logs
<source>
  @type tail
  path /var/log/syslog
  pos_file /var/log/fluentd/syslog.pos
  tag system.syslog
  format syslog
</source>

# Filter: Parse Docker logs
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

# Filter: Add Kubernetes metadata (if running in K8s)
<filter **>
  @type kubernetes_metadata
  @id filter_kube_metadata
</filter>

# Filter: Add timestamp
<filter **>
  @type record_transformer
  <record>
    timestamp ${time.strftime('%Y-%m-%d %H:%M:%S')}
    hostname "#{Socket.gethostname}"
  </record>
</filter>

# Match: Application logs to Elasticsearch
<match app.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name ultra-aircon-app-%{+YYYY.MM.dd}
  type_name _doc
  include_tag_key true
  tag_key @log_name
  flush_interval 5s
  retry_tag retry_elasticsearch
</match>

# Match: System logs to Elasticsearch
<match system.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name ultra-aircon-system-%{+YYYY.MM.dd}
  type_name _doc
  include_tag_key true
  flush_interval 10s
</match>

# Match: Docker logs to Elasticsearch
<match docker.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name ultra-aircon-docker-%{+YYYY.MM.dd}
  type_name _doc
  include_tag_key true
  flush_interval 5s
</match>

# Match: Error logs (separate index for easier querying)
<match **>
  @type grep
  <exclude>
    key level
    pattern ^(INFO|DEBUG)$
  </exclude>
</match>

<match **>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    index_name ultra-aircon-errors-%{+YYYY.MM.dd}
    type_name _doc
    flush_interval 5s
  </store>
  <store>
    @type stdout
  </store>
</match>

# Match: Retry failed Elasticsearch inserts
<match retry_elasticsearch>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name ultra-aircon-retry-%{+YYYY.MM.dd}
  type_name _doc
  flush_interval 10s
  retry_tag retry_elasticsearch
</match>

# Match: All other logs to stdout for debugging
<match **>
  @type stdout
</match>
