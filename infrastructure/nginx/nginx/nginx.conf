events {}

http {

 server {

   listen 80;

   # Backend API
   location /api/ {

     proxy_pass http://backend:3000/;

     proxy_set_header Host $host;
     proxy_set_header X-Real-IP $remote_addr;
     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

   }

   # Admin dashboard
   location /admin/ {

     proxy_pass http://admin:3000/;

     proxy_set_header Host $host;
     proxy_set_header X-Real-IP $remote_addr;
     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

   }

   # Default route
   location / {

     proxy_pass http://backend:3000;

   }

 }

}