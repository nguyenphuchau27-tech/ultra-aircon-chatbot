global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'prometheus-alerts.yaml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ---------- APPLICATION METRICS ----------
  - job_name: 'ultra-aircon-backend'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'ultra-aircon-admin'
    static_configs:
      - targets: ['admin:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ---------- INFRASTRUCTURE METRICS ----------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    scrape_interval: 10s

  # ---------- NODE EXPORTER (SYSTEM METRICS) ----------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # ---------- CADVISOR (CONTAINER METRICS) ----------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
    metrics_path: '/metrics'

  # ---------- PROMETHEUS ITSELF ----------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
