name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-build-test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm install

      - name: Format check
        run: npm run format:check

      - name: Lint TypeScript
        run: npm run lint

      - name: Run backend tests
        run: |
          cd backend/api-gateway
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run Python type checks
        run: |
          mypy ai-platform

      - name: Login to container registry
        uses: docker/login-action@v5
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: true
          tags: ${{ secrets.REGISTRY_PATH }}/api-gateway:latest

      - name: Build and push admin dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.admin
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.ultra-aircon.com/api
          tags: ${{ secrets.REGISTRY_PATH }}/admin-dashboard:latest

      - name: Build and push diagnostic AI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.ai
          push: true
          build-args: |
            MODULE_DIR=ai-platform/diagnostic-ai
          tags: ${{ secrets.REGISTRY_PATH }}/diagnostic-ai:latest

      - name: Build and push pricing AI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.ai
          push: true
          build-args: |
            MODULE_DIR=ai-platform/pricing-ai
          tags: ${{ secrets.REGISTRY_PATH }}/pricing-ai:latest

  deploy:
    name: Deploy to Kubernetes
    needs: lint-build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG" > ~/.kube/config

      - name: Deploy Kubernetes manifests
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_PATH }}
        run: |
          python - <<'PY'
import os
from pathlib import Path
manifests = [
    'infrastructure/kubernetes/platform-namespace.yaml',
    'infrastructure/kubernetes/platform-secrets.yaml',
    'infrastructure/kubernetes/redis-deployment.yaml',
    'infrastructure/kubernetes/postgres-service.yaml',
    'infrastructure/kubernetes/postgres-statefulset.yaml',
    'infrastructure/kubernetes/api-gateway-deployment.yaml',
    'infrastructure/kubernetes/admin-dashboard-deployment.yaml',
    'infrastructure/kubernetes/diagnostic-ai-service.yaml',
    'infrastructure/kubernetes/diagnostic-ai-deployment.yaml',
    'infrastructure/kubernetes/pricing-ai-deployment.yaml',
    'infrastructure/kubernetes/pricing-ai-service.yaml',
    'infrastructure/kubernetes/fluentd-daemonset.yaml',
    'infrastructure/monitoring/prometheus/prometheus-deployment.yaml',
    'infrastructure/logging/elasticsearch-deployment.yaml',
    'infrastructure/logging/kibana-deployment.yaml',
]
output = Path('/tmp/k8s')
output.mkdir(parents=True, exist_ok=True)
for manifest in manifests:
    text = Path(manifest).read_text()
    text = text.replace('${REGISTRY_URL}', os.environ['REGISTRY_URL'])
    Path(output, Path(manifest).name).write_text(text)
PY
          kubectl apply -f /tmp/k8s
