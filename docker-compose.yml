services:
  postgres:
    image: postgres:16-alpine
    container_name: ultra-aircon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aircon_startup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aircon_startup"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ultra-network

  redis:
    image: redis:7-alpine
    container_name: ultra-aircon-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - ultra-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ultra-backend:latest
    container_name: ultra-aircon-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 3001

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aircon_startup
      DB_USER: postgres
      DB_PASS: postgres

      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      REDIS_HOST: redis
      REDIS_PORT: 6379

      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ultra-network

  grafana:
    image: grafana/grafana:latest
    container_name: ultra-aircon-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ultra-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  ultra-network:
    driver: bridge