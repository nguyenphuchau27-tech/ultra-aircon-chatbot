apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
spec:
  groups:
    - name: backend-alerts
      rules:
        - alert: HighCPU
          expr: sum(rate(container_cpu_usage_seconds_total[1m])) by (pod) > 0.8
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: 'Pod CPU > 80%'
            description: 'Pod {{ $labels.pod }} CPU usage high'

        - alert: HighMemory
          expr: sum(container_memory_usage_bytes) by (pod) > 500000000
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: 'Pod Memory > 500MB'
            description: 'Pod {{ $labels.pod }} memory usage high'
